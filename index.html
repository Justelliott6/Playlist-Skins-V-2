<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Playlist Skins</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>

body{
background:#06080d;
font-family:"Inter",sans-serif;
color:#f5f6fa;
margin:0;
padding:0;
}

.wrapper{
max-width:900px;
margin:auto;
padding:20px;
}

h1{
font-family:"Anton",sans-serif;
font-size:60px;
letter-spacing:4px;
color:#ffd82b;
margin:0;
text-align:center;
}

.subtitle{
text-align:center;
margin-bottom:30px;
color:#9aa6bd;
}

.panel{
background:#10141c;
border-radius:14px;
padding:18px;
margin-bottom:18px;
border:1px solid #232b37;
}

.panel h2{
font-size:14px;
letter-spacing:2px;
color:#7fa0ff;
margin-top:0;
}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #2c3647;
background:#05070c;
color:white;
}

.controls{
display:flex;
gap:10px;
margin-top:14px;
flex-wrap:wrap;
}

button{
background:#ffd82b;
border:none;
padding:10px 18px;
border-radius:999px;
font-weight:700;
cursor:pointer;
}

button.secondary{
background:#32eaa0;
}

button.dark{
background:#2c3647;
color:white;
}

.preview{
width:680px;
max-width:100%;
margin:auto;
position:relative;
border-radius:18px;
overflow:hidden;
}

.preview img{
width:100%;
display:block;
}

.player-slot{
position:absolute;

top:24%;
left:13%;
width:62%;
height:60px;

overflow:hidden;
border-radius:8px;
}

.player-slot iframe{
position:absolute;

top:-140px;
left:0;

width:100%;
height:300px;
border:none;
}

.badge{
position:absolute;
top:10px;
padding:6px 12px;
font-size:12px;
border-radius:999px;
}

.skin-badge{
left:10px;
background:#000000a0;
}

.platform-badge{
right:10px;
background:#ffd82b;
color:black;
}

.sharebox{
width:100%;
background:#05070c;
border:1px solid #2c3647;
border-radius:8px;
padding:10px;
font-size:12px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="wrapper">

<h1>PLAYLIST SKINS</h1>
<div class="subtitle">Pick a skin, paste a music link, build something worth sharing.</div>

<div class="panel">

<h2>1. BUILD YOUR PLAYER</h2>

<label>Music Link</label>
<input id="music" placeholder="Paste Spotify / YouTube / SoundCloud link">

<label style="margin-top:12px;">Skin</label>

<select id="skin">
<option value="rock">Bring Back Rock 101</option>
<option value="hiphop">Street Heat</option>
<option value="vinyl">Needle Drop</option>
<option value="neon">Night Pulse</option>
<option value="tape">Tape Run</option>
</select>

<div class="controls">

<button onclick="generate()">Generate Player</button>

<button class="secondary" onclick="copy()">Copy Share Link</button>

<button class="dark" onclick="openlink()">Open Music Link</button>

</div>

</div>

<div class="panel">

<h2>2. PREVIEW</h2>

<div class="preview">

<img id="skinimg" src="https://primary.jwwb.nl/public/g/u/b/temp-lwmvpgonevezulioxwug/untitled-design-high.png">

<div class="badge skin-badge" id="skinname">ROCK 101</div>

<div class="badge platform-badge">SPOTIFY</div>

<div class="player-slot" id="slot"></div>

</div>

</div>

<div class="panel">

<h2>3. SHARE LINK</h2>

<div class="sharebox" id="share"></div>

</div>

</div>

<script>

const skins={
rock:"https://primary.jwwb.nl/public/g/u/b/temp-lwmvpgonevezulioxwug/untitled-design-high.png",
hiphop:"https://images.unsplash.com/photo-1548092372-0d1bd40894a3",
vinyl:"https://images.unsplash.com/photo-1511379938547-c1f69419868d",
neon:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e",
tape:"https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4"
}

function detect(url){

if(url.includes("spotify")) return "spotify"
if(url.includes("youtube")) return "youtube"
if(url.includes("soundcloud")) return "soundcloud"

return "link"

}

function spotify(url){

let id=url.split("playlist/")[1]

if(!id)return null

id=id.split("?")[0]

return "https://open.spotify.com/embed/playlist/"+id

}

function generate(){

let url=document.getElementById("music").value

let skin=document.getElementById("skin").value

document.getElementById("skinimg").src=skins[skin]

document.getElementById("skinname").innerText=skin.toUpperCase()

let platform=detect(url)

let slot=document.getElementById("slot")

slot.innerHTML=""

if(platform=="spotify"){

let embed=spotify(url)

slot.innerHTML=`<iframe src="${embed}"></iframe>`

}else{

slot.innerHTML=`<div style="background:#111;padding:10px;border-radius:6px">Open Link</div>`

}

let share=location.origin+location.pathname+"?music="+encodeURIComponent(url)+"&skin="+skin

document.getElementById("share").innerText=share

}

function copy(){

navigator.clipboard.writeText(document.getElementById("share").innerText)

}

function openlink(){

window.open(document.getElementById("music").value)

}

</script>

</body>
</html>
