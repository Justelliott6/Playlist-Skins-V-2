<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Playlist Skins App</title>

<link rel="manifest" href="manifest.json">

<style>

body{
  font-family: Arial, sans-serif;
  background:#000;
  color:white;
  text-align:center;
  padding:20px;
}

h1{
  margin-bottom:5px;
}

.subtitle{
  color:#ccc;
  margin-bottom:25px;
}

/* playlist input */

#playlist-input{
  margin:20px auto;
  max-width:500px;
}

#playlist-url{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid #555;
  background:#000;
  color:#fff;
}

#playlist-btn{
  margin-top:12px;
  padding:10px 18px;
  border:none;
  border-radius:6px;
  background:#ffc600;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* boombox container */

#skin-container{
  position:relative;
  max-width:600px;
  margin:30px auto;
}

#boombox{
  width:100%;
  height:auto;
}

/* spotify player positioning */

#spotify-player-wrap{
  position:absolute;
  top:32px;
  left:50px;
  width:500px;
  height:60px;
  overflow:hidden;
  border-radius:8px;
}

#spotify-player{
  width:100%;
  height:100%;
  border:0;
  display:none;
}

</style>
</head>

<body>

<h1>Playlist Skins App</h1>
<p class="subtitle">Add this app to your device and bring back Rock 101.</p>

<div id="playlist-input">

<p>Paste your Spotify playlist link:</p>

<input
type="text"
id="playlist-url"
placeholder="https://open.spotify.com/playlist/...">

<br>

<button id="playlist-btn">Load Playlist</button>

</div>


<div id="skin-container">

<img id="boombox" src="Boom Box (1).png">

<div id="spotify-player-wrap">

<iframe
id="spotify-player"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
loading="lazy">
</iframe>

</div>

</div>


<script src="install-prompt.js"></script>

<script>

/* register service worker */

if ("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("service-worker.js");
  });
}

/* spotify playlist loader */

const playlistInput=document.getElementById("playlist-url");
const playlistBtn=document.getElementById("playlist-btn");
const spotifyPlayer=document.getElementById("spotify-player");

function getSpotifyEmbedUrl(url){

const match=url.match(/playlist\/([a-zA-Z0-9]+)/);

if(!match) return null;

const id=match[1];

return `https://open.spotify.com/embed/playlist/${id}?utm_source=generator`;

}

playlistBtn.addEventListener("click",()=>{

const url=playlistInput.value.trim();

if(!url) return;

const embed=getSpotifyEmbedUrl(url);

if(!embed){
alert("Invalid Spotify playlist link");
return;
}

spotifyPlayer.src=embed;
spotifyPlayer.style.display="block";

});

</script>

</body>
</html>
